<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — VanTripJapan</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RC4937NTHC"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-RC4937NTHC');</script>
  <link rel="stylesheet" href="/css/style.css?v=20260429">
  <style>
    .error-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 24px;
      background: var(--color-bg);
    }
    .error-content { max-width: 480px; }
    .error-code {
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 900;
      line-height: 1;
      opacity: 0.08;
      margin-bottom: -20px;
      color: var(--color-accent);
    }
    .error-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--color-text);
    }
    .error-desc {
      font-size: 1rem;
      color: var(--color-text-secondary);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-text);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 980px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .error-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">
        The page you're looking for doesn't exist or has been moved.<br>
        Let's get you back on the road.
      </p>
      <a href="/" class="error-btn">← Back to Home</a>
    </div>
  </div>
</body>
</html>
