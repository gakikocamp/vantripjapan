<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanTripJapan 管理ダッシュボード</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/admin/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-van-shuttle"></i>
                <span>VanTrip</span>
            </div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" data-page="dashboard">
                <i class="fas fa-chart-pie"></i>
                <span>ダッシュボード</span>
            </li>
            <li class="nav-item" data-page="bookings">
                <i class="fas fa-calendar-check"></i>
                <span>予約管理</span>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span>管理者</span>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <div class="main-content" id="mainContent">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
                <h1 id="pageTitle">ダッシュボード</h1>
            </div>
            <div class="date-display">
                <i class="fas fa-calendar"></i>
                <span id="currentDate"></span>
            </div>
        </header>

        <!-- Dashboard Page -->
        <section class="page active" id="page-dashboard">
            <div class="stats-grid">
                <div class="stat-card stat-customers">
                    <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                    <div class="stat-info">
                        <span class="stat-value" id="statBookings">0</span>
                        <span class="stat-label">予約総数</span>
                    </div>
                </div>
                <div class="stat-card stat-rentals">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-info">
                        <span class="stat-value" id="statDocs">0</span>
                        <span class="stat-label">書類総数</span>
                    </div>
                </div>
                <div class="stat-card stat-countries">
                    <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="stat-info">
                        <span class="stat-value" id="statUnverified">0</span>
                        <span class="stat-label">未確認書類</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-list"></i> ステータス別</h3>
                    </div>
                    <div class="card-body" id="statusBreakdown">
                        <p class="empty-state">読み込み中...</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-clock"></i> 最近の予約</h3>
                    </div>
                    <div class="card-body" id="recentBookings">
                        <p class="empty-state">読み込み中...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bookings Page -->
        <section class="page" id="page-bookings">
            <div class="page-actions" style="display:flex; gap:12px; justify-content:flex-end; margin-bottom:16px;">
                <button class="btn btn-primary" onclick="openCreateBookingModal()">
                    <i class="fas fa-plus"></i> 新規予約登録
                </button>
                <a href="/book/" target="_blank" class="btn btn-secondary" style="display:inline-flex; align-items:center; gap:6px;">
                    <i class="fas fa-external-link-alt"></i> 予約フォームを開く
                </a>
            </div>

            <div class="card">
                <div class="status-tabs" id="statusTabs">
                    <button class="status-tab active" data-status="all">全て</button>
                    <button class="status-tab" data-status="form_submitted">📩 新規</button>
                    <button class="status-tab" data-status="docs_requested">📋 書類待ち</button>
                    <button class="status-tab" data-status="docs_received">✅ 書類受領</button>
                    <button class="status-tab" data-status="payment_sent">💳 決済待ち</button>
                    <button class="status-tab" data-status="confirmed">🎉 確定</button>
                    <button class="status-tab" data-status="active">🚐 利用中</button>
                    <button class="status-tab" data-status="completed">✨ 完了</button>
                </div>
                <div class="card-header">
                    <h3><i class="fas fa-calendar-check"></i> 予約一覧</h3>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>名前</th>
                                    <th>車種</th>
                                    <th>ピックアップ</th>
                                    <th>返却</th>
                                    <th>ステータス</th>
                                    <th>書類</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="bookingsBody"></tbody>
                        </table>
                    </div>
                    <p class="empty-state" id="bookingsEmpty" style="display:none;">予約がありません</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Booking Detail Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h3 id="bookingModalTitle">予約詳細</h3>
                <button class="modal-close" onclick="$('#bookingModal').classList.remove('active')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="bookingModalBody"></div>
        </div>
    </div>

    <!-- Create Booking Modal (Manual Booking) -->
    <div class="modal-overlay" id="createBookingModal">
        <div class="modal" style="max-width:600px;">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> 新規予約の直接登録</h3>
                <button class="modal-close" onclick="$('#createBookingModal').classList.remove('active')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="createBookingForm" onsubmit="submitManualBooking(event)">
                    <div style="display:grid; grid-template-columns:1fr; gap:12px;">
                        <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                            <label style="font-weight:600; font-size:0.85rem;">車種 <span style="color:red;">*</span></label>
                            <select name="vehicle_type" required style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                                <option value="MAZDA BONGO">🚐 MAZDA BONGO</option>
                                <option value="TOYOTA PROBOX">🏕️ TOYOTA PROBOX</option>
                                <option value="DAIHATSU POCKET LOFT">🚐 DAIHATSU POCKET LOFT</option>
                            </select>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                            <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                                <label style="font-weight:600; font-size:0.85rem;">貸出日時 <span style="color:red;">*</span></label>
                                <input type="datetime-local" name="pickup_datetime" required style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                            </div>
                            <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                                <label style="font-weight:600; font-size:0.85rem;">返却日時 <span style="color:red;">*</span></label>
                                <input type="datetime-local" name="return_datetime" required style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                            </div>
                        </div>
                        <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                            <label style="font-weight:600; font-size:0.85rem;">お客様氏名 <span style="color:red;">*</span></label>
                            <input type="text" name="full_name" required placeholder="例: 山田 太郎" style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                            <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                                <label style="font-weight:600; font-size:0.85rem;">メールアドレス <span style="color:red;">*</span></label>
                                <input type="email" name="email" required value="whatsapp@vantripjapan.jp" style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                            </div>
                            <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                                <label style="font-weight:600; font-size:0.85rem;">電話番号</label>
                                <input type="text" name="phone" placeholder="例: +81 90-1234-5678" style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                            </div>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                            <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                                <label style="font-weight:600; font-size:0.85rem;">運転者数</label>
                                <select name="num_drivers" style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                                    <option value="1">1名</option>
                                    <option value="2">2名</option>
                                    <option value="3">3名</option>
                                    <option value="4">4名</option>
                                </select>
                            </div>
                            <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                                <label style="font-weight:600; font-size:0.85rem;">登録ステータス <span style="color:red;">*</span></label>
                                <select name="status" style="padding:8px; border:1px solid #ddd; border-radius:6px;">
                                    <option value="confirmed">🎉 確定 (空き状況をブロック)</option>
                                    <option value="docs_requested">📋 書類待ち (空き状況をブロック)</option>
                                    <option value="active">🚐 利用中 (空き状況をブロック)</option>
                                    <option value="form_submitted">📩 新規 (仮押さえしない)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                            <label style="font-weight:600; font-size:0.85rem;">メモ・その他要望</label>
                            <textarea name="camping_gear_notes" placeholder="例: WhatsAppからの予約。オプション品追加予定等" style="padding:8px; border:1px solid #ddd; border-radius:6px; resize:vertical; min-height:60px;"></textarea>
                        </div>
                        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:12px;">
                            <button type="button" class="btn btn-secondary" onclick="$('#createBookingModal').classList.remove('active')">キャンセル</button>
                            <button type="submit" class="btn btn-primary">登録する</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toastContainer" style="position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

    <script src="/admin/app.js"></script>
</body>
</html>
