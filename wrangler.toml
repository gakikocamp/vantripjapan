# wrangler.toml — VanTripJapan Cloudflare Pages configuration
name = "vantripjapan"
pages_build_output_dir = "site"
compatibility_date = "2024-01-01"

# Shared D1 database with camjyo.com CMS
# Articles with site='vantrip' belong to VanTripJapan
[[d1_databases]]
binding = "DB"
database_name = "camjyo-cms"
database_id = "36a71050-35e1-4f12-95cd-4280994cc68d"

# VanTripJapan customer booking database (PII — encrypted)
[[d1_databases]]
binding = "CUSTOMERS_DB"
database_name = "vtj-customers"
database_id = "7027feae-c667-4908-a67d-ce6cf4486428"

# R2 bucket for encrypted customer documents (license, passport)
# UNCOMMENT after creating: wrangler r2 bucket create vtj-documents
# [[r2_buckets]]
# binding = "DOCUMENTS"
# bucket_name = "vtj-documents"
